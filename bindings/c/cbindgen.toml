language = "C"
header = "/* wickra-exchange C ABI — generated by cbindgen. Do not edit by hand. */"
include_guard = "WICKRA_EXCHANGE_H"
pragma_once = true
# Wrap declarations in extern "C" under __cplusplus so the header is usable from
# C++ directly.
cpp_compat = true
tab_width = 4
documentation = true
style = "type"

[export]
# Emit the WICKRA_* status/side/status/event constants.
include = ["WickraExchange", "WickraOrder", "WickraEvent"]

[fn]
sort_by = "None"

[parse]
# Only this crate defines the ABI; the wrapped exchange types never cross the
# boundary, so there is no need to parse dependencies.
parse_deps = false
